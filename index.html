<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Thermal Label Print</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{

            background:#ececec;

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            flex-direction:column;

            gap:20px;

            padding:20px;
        }

        /* PRINT BUTTON */

        .print-btn{

            background:#111;

            color:white;

            border:none;

            padding:10px 18px;

            border-radius:8px;

            cursor:pointer;

            font-size:13px;

            font-weight:600;
        }

        /* LABEL */

        .label-card{

            /* LANDSCAPE SIZE */
            width:5cm;

            height:3.5cm;

            background:white;

            border:1.5px solid #bdbdbd;

            border-radius:6px;

            padding:2px;

            overflow:hidden;
        }

        table{

            width:100%;

            height:100%;

            border-collapse:collapse;

            table-layout:fixed;
        }

        td{

            border:1px solid #444;

            padding:1px 3px;

            font-size:7px;

            color:#111;

            vertical-align:middle;
        }

        /* LEFT COLUMN */

        .label{

            width:42%;

            font-weight:500;

            text-transform:capitalize;
        }

        /* RIGHT COLUMN */

        .value{
            font-weight:700;
        }

        /* INPUT */

        input{

            width:100%;

            border:none;

            outline:none;

            background:transparent;

            font-size:7px;

            font-weight:700;

            color:#111;
        }

        /* TEXT FORMATS */

        .title-case{
            text-transform:capitalize;
        }

        .item-name{
            text-transform:none;
        }

        /* IMPORTANT PRINT FIX */

        @media print{

            html,
            body{

                width:5cm;
                height:3.5cm;

                margin:0 !important;
                padding:0 !important;

                overflow:hidden;

                background:white;
            }

            .print-btn{
                display:none;
            }

            .label-card{

                width:5cm !important;

                height:3.5cm !important;

                margin:0;

                border:1.5px solid #bdbdbd;

                page-break-after:avoid;
            }

            @page{

                /* IMPORTANT */
                size:5cm 3.5cm;

                margin:0;

                /* FORCE LANDSCAPE */
                page-orientation:rotate-left;
            }
        }

    </style>
</head>

<body>

    <button class="print-btn" onclick="window.print()">
        Print Label
    </button>

    <!-- LABEL -->

    <div class="label-card">

        <table>

            <tr>

                <td class="label">
                    Item Id
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="title-case"
                        placeholder="46"
                    >

                </td>

            </tr>

            <tr>

                <td class="label">
                    Item Name
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="item-name"
                        placeholder="9 PC CUT"
                    >

                </td>

            </tr>

            <tr>

                <td class="label">
                    Date
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="title-case"
                        placeholder="6 May"
                    >

                </td>

            </tr>

            <tr>

                <td class="label">
                    Item Group
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="title-case"
                        placeholder="Non-Veg Marination"
                    >

                </td>

            </tr>

            <tr>

                <td class="label">
                    Make Time
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="title-case"
                        placeholder="8May 17:40"
                    >

                </td>

            </tr>

            <tr>

                <td class="label">
                    Ready Time
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="title-case"
                        placeholder="9May 17:40"
                    >

                </td>

            </tr>

            <tr>

                <td class="label">
                    Discard Time
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="title-case"
                        placeholder="10May 17:40"
                    >

                </td>

            </tr>

        </table>

    </div>

</body>

</html>
