<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thermal Label Print</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    background:#ececec;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    flex-direction:column;

    gap:15px;

    padding:20px;
}

/* BUTTONS */

.button-group{

    display:flex;

    gap:10px;
}

button{

    background:#111;

    color:white;

    border:none;

    padding:10px 18px;

    border-radius:8px;

    cursor:pointer;

    font-size:13px;

    font-weight:600;
}

button:hover{
    opacity:0.9;
}

/* PRINT AREA */

.print-area{

    width:3.5cm;

    height:5cm;

    background:white;

    overflow:hidden;

    display:flex;

    justify-content:center;

    align-items:center;

    position:relative;
}

/* LABEL */

.label-card{

    width:3.5cm;

    height:5cm;

    background:white;

    border:1px solid #444;

    border-radius:5px;

    overflow:hidden;

    transition:0.3s;
}

/* ROTATED PERFECT FIT */

.rotated{

    width:5cm;

    height:3.5cm;

    transform:rotate(90deg);

    transform-origin:center center;

    position:absolute;

    top:0.75cm;

    left:-0.75cm;
}

/* TABLE */

table{

    width:100%;

    height:100%;

    border-collapse:collapse;

    table-layout:fixed;
}

/* PERFECT ROW FIT */

tr{

    height:calc(100% / 7);
}

td{

    border:1px solid #444;

    padding:0 2px;

    font-size:6px;

    color:#111;

    vertical-align:middle;

    line-height:1;

    overflow:hidden;
}

/* LEFT COLUMN */

.label{

    width:42%;

    font-weight:500;

    text-transform:capitalize;
}

/* RIGHT COLUMN */

.value{

    font-weight:700;
}

/* INPUT */

input{

    width:100%;

    border:none;

    outline:none;

    background:transparent;

    font-size:6px;

    font-weight:700;

    color:#111;

    line-height:1;
}

/* FORMATS */

.title-case{
    text-transform:capitalize;
}

.item-name{
    text-transform:none;
}

/* PRINT ONLY LABEL */

@media print{

    html,
    body{

        width:3.5cm;

        height:5cm;

        margin:0 !important;

        padding:0 !important;

        overflow:hidden;

        background:white;
    }

    body *{

        visibility:hidden;
    }

    .print-area,
    .print-area *{

        visibility:visible;
    }

    .button-group{

        display:none !important;
    }

    .print-area{

        position:absolute;

        top:0;

        left:0;

        width:3.5cm;

        height:5cm;

        overflow:hidden;

        margin:0;

        padding:0;
    }

    .label-card{

        width:100%;

        height:100%;
    }

    @page{

        size:3.5cm 5cm;

        margin:0;
    }
}

</style>

</head>

<body>

<!-- BUTTONS -->

<div class="button-group">

    <button onclick="rotateAndPrint()">
        Rotate + Print
    </button>

    <button onclick="normalView()">
        Normal View
    </button>

</div>

<!-- PRINT AREA -->

<div class="print-area">

    <div class="label-card" id="label">

        <table>

            <tr>

                <td class="label">
                    Item Id
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="title-case"
                        placeholder="46"
                    >

                </td>

            </tr>

            <tr>

                <td class="label">
                    Item Name
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="item-name"
                        placeholder="9 PC CUT"
                    >

                </td>

            </tr>

            <tr>

                <td class="label">
                    Date
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="title-case"
                        placeholder="6 May"
                    >

                </td>

            </tr>

            <tr>

                <td class="label">
                    Item Group
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="title-case"
                        placeholder="Non-Veg Marination"
                    >

                </td>

            </tr>

            <tr>

                <td class="label">
                    Make Time
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="title-case"
                        placeholder="8May 17:40"
                    >

                </td>

            </tr>

            <tr>

                <td class="label">
                    Ready Time
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="title-case"
                        placeholder="9May 17:40"
                    >

                </td>

            </tr>

            <tr>

                <td class="label">
                    Discard Time
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="title-case"
                        placeholder="10May 17:40"
                    >

                </td>

            </tr>

        </table>

    </div>

</div>

<script>

const label = document.getElementById("label");

function rotateAndPrint(){

    label.classList.add("rotated");

    setTimeout(() => {

        window.print();

    }, 300);
}

function normalView(){

    label.classList.remove("rotated");
}

</script>

</body>

</html>
