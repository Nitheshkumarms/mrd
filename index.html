<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Thermal Label Studio Pro</title>

    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg-dark: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-muted: #94a3b8;
            --text-light: #f8fafc;
            --accent: #a855f7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            /* Sleek background mesh gradient with dynamic blueprint grid */
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.007) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.007) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 20px 20px, 20px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* WORKSPACE LAYOUT */
        .workspace {
            display: flex;
            flex-direction: row;
            gap: 40px;
            max-width: 1100px;
            width: 100%;
            align-items: stretch;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }

        /* CONTROL PANEL (Glassmorphism Sidebar) */
        .control-pane {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            padding: 30px;
            border-radius: 24px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 5px;
        }

        .brand-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 12px var(--primary);
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .brand-title-group {
            display: flex;
            flex-direction: column;
        }

        .brand-title {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 0.8px;
            color: var(--text-light);
            text-transform: uppercase;
        }

        .brand-subtitle {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .control-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 4px;
        }

        /* BUTTONS STYLING */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-light);
            border: 1px solid var(--card-border);
            padding: 12px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            opacity: 0.8;
            transition: transform 0.25s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .btn:hover svg {
            transform: scale(1.08);
        }

        .btn.active {
            background: rgba(99, 102, 241, 0.15);
            border-color: var(--primary);
            color: #a5b4fc;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            font-weight: 700;
            padding: 14px 22px;
            box-shadow: 0 12px 24px rgba(99, 102, 241, 0.25);
            margin-top: 15px;
            justify-content: center;
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
            background: linear-gradient(135deg, #4f46e5, #9333ea);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        /* METRICS & STATUS PANEL */
        .status-badge {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            padding: 12px;
            border-radius: 14px;
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-value {
            font-weight: 700;
            color: var(--text-light);
        }

        /* DYNAMIC EDITING CANVAS */
        .preview-canvas {
            flex: 1;
            position: relative;
            background: rgba(15, 23, 42, 0.3);
            border: 1px dashed rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 480px;
            min-width: 480px;
            padding: 50px;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.3);
        }

        .canvas-title {
            position: absolute;
            top: 25px;
            left: 30px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-pulse {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
            animation: pulse-ring 1.5s infinite;
        }

        /* EXACT PHYSICAL SIZE CONTAINER */
        .print-area {
            width: 5cm;
            height: 3.5cm;
            position: relative;
            overflow: hidden;
            background: white;
            border-radius: 12px;
            /* Box shadow that floats dynamically */
            box-shadow: 0 35px 70px -15px rgba(0, 0, 0, 0.6), 0 0 50px rgba(99, 102, 241, 0.15);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: center center;
        }

        /* Dynamic Morph Dimensions when Rotated */
        .print-area.rotated {
            width: 3.5cm;
            height: 5cm;
        }

        /* Dynamic Grid Rotation inside Portrait Label */
        .print-area.rotated .label-grid {
            width: 5cm !important;
            height: 3.5cm !important;
            position: absolute;
            top: 0.75cm;
            left: -0.75cm;
            transform: rotate(90deg);
            transform-origin: center center;
        }

        /* WHITE PAPER LABEL CARD */
        .label-card {
            width: 100%;
            height: 100%;
            position: relative;
            background: white;
            border: 1px solid #111;
            padding: 2.5px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* THE GRID WRAPPER */
        .label-grid {
            display: grid;
            grid-template-columns: 41% 59%;
            grid-template-rows: repeat(7, 1fr);
            width: 100%;
            height: 100%;
            border-top: 1.2px solid #111;
            border-left: 1.2px solid #111;
        }

        .grid-cell {
            border-right: 1.2px solid #111;
            border-bottom: 1.2px solid #111;
            padding: 2px 4px;
            font-size: 7.8px;
            color: #000;
            display: flex;
            align-items: center;
            line-height: 1.15;
            letter-spacing: -0.05px;
        }

        /* LEFT STAMP LABELS */
        .label {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1px;
            color: #222;
            font-size: 6.8px;
        }

        /* RIGHT VALUES */
        .value {
            font-weight: 800;
        }

        /* FLAT INLINE INPUTS */
        input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-size: 7.8px;
            font-weight: 800;
            color: #000;
            padding: 0;
            margin: 0;
            font-family: inherit;
        }

        input::placeholder {
            color: #888;
            font-weight: 400;
        }

        /* Monospace and formatting helpers for numeric stamps */
        .title-case {
            text-transform: capitalize;
        }

        .item-name {
            text-transform: none;
        }

        .stamp-monospace {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 7.2px;
            letter-spacing: -0.1px;
        }

        /* TACTILE DYNAMIC BLUEPRINT DIMENSIONS (Figma Style) */
        .dimension-indicator {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .width-indicator {
            left: 50%;
            bottom: -30px;
            transform: translateX(-50%);
            width: 5cm;
            height: 20px;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
        }
        
        .print-area.rotated ~ .width-indicator {
            width: 3.5cm;
        }

        .width-indicator::before {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            margin: 0 10px;
        }
        
        .width-indicator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            margin: 0 10px;
        }

        .height-indicator {
            top: 50%;
            right: -35px;
            transform: translateY(-50%) rotate(90deg);
            width: 3.5cm;
            height: 20px;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
        }

        .print-area.rotated ~ .height-indicator {
            width: 5cm;
        }

        .height-indicator::before {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            margin: 0 10px;
        }
        
        .height-indicator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            margin: 0 10px;
        }

        /* KEYFRAMES */
        @keyframes pulse-ring {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 8px rgba(99, 102, 241, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0);
            }
        }

        /* PRINT MEDIA QUERIES */
        @media print {
            body {
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                background-image: none !important;
            }
            
            .control-pane, .dimension-indicator, .canvas-title {
                display: none !important;
            }
            
            .workspace {
                display: block !important;
                padding: 0 !important;
                margin: 0 !important;
                max-width: none !important;
                width: auto !important;
                height: auto !important;
                background: none !important;
                border: none !important;
            }
            
            .preview-canvas {
                background: none !important;
                border: none !important;
                padding: 0 !important;
                min-width: unset !important;
                min-height: unset !important;
                display: block !important;
                box-shadow: none !important;
                margin: 0 !important;
            }
            
            .print-area {
                box-shadow: none !important;
                border-radius: 0 !important;
                margin: 0 !important;
                transition: none !important;
                background: white !important;
            }

            .label-card {
                border: 1px solid #000 !important;
                border-radius: 0 !important;
                box-shadow: none !important;
                transition: none !important;
            }
        }
    </style>
</head>

<body>

    <div class="workspace">

        <!-- CONTROL PANEL (GLASSMORPHIC) -->
        <div class="control-pane">
            <div class="brand">
                <div class="brand-dot"></div>
                <div class="brand-title-group">
                    <h1 class="brand-title">Thermal Label</h1>
                    <span class="brand-subtitle">STUDIO PRO v1.1</span>
                </div>
            </div>

            <!-- ORIENTATION TOGGLES -->
            <div class="control-section">
                <h3 class="section-title">Orientation</h3>
                <div class="btn-group">
                    <button class="btn active" id="btn-landscape" onclick="normalView()">
                        <!-- Landscape Icon -->
                        <svg viewBox="0 0 24 24">
                            <rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
                            <line x1="7" y1="9" x2="17" y2="9" stroke="currentColor" stroke-width="1.5"/>
                            <line x1="7" y1="13" x2="13" y2="13" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                        Landscape (5x3.5)
                    </button>
                    <button class="btn" id="btn-portrait" onclick="setOrientation(true)">
                        <!-- Portrait Icon -->
                        <svg viewBox="0 0 24 24">
                            <rect x="5" y="3" width="14" height="18" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
                            <line x1="9" y1="7" x2="15" y2="7" stroke="currentColor" stroke-width="1.5"/>
                            <line x1="9" y1="11" x2="15" y2="11" stroke="currentColor" stroke-width="1.5"/>
                            <line x1="9" y1="15" x2="12" y2="15" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                        Portrait (3.5x5)
                    </button>
                </div>
            </div>

            <!-- METRICS PANEL -->
            <div class="control-section">
                <h3 class="section-title">Label Specs</h3>
                <div class="status-badge">
                    <div class="status-row">
                        <span>Mode:</span>
                        <span class="status-value" id="status-mode">Landscape</span>
                    </div>
                    <div class="status-row">
                        <span>Canvas Width:</span>
                        <span class="status-value" id="status-width">5.0 cm</span>
                    </div>
                    <div class="status-row">
                        <span>Canvas Height:</span>
                        <span class="status-value" id="status-height">3.5 cm</span>
                    </div>
                    <div class="status-row">
                        <span>Status:</span>
                        <span class="status-value" style="color: #4ade80;">Ready to print</span>
                    </div>
                </div>
            </div>

            <!-- PRINT ACTION -->
            <div class="control-section">
                <h3 class="section-title">Actions</h3>
                <button class="btn btn-primary" onclick="triggerPrint()">
                    <!-- Printer Icon -->
                    <svg viewBox="0 0 24 24" style="fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; margin-right: 2px;">
                        <path d="M6 9V2h12v7"></path>
                        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                        <rect x="6" y="14" width="12" height="8"></rect>
                    </svg>
                    Print Label
                </button>
            </div>
        </div>

        <!-- PRINT PREVIEW WINDOW -->
        <div class="preview-canvas">
            <div class="canvas-title">
                <div class="live-pulse"></div>
                Live Label Canvas
            </div>

            <!-- MAIN EMULATED PRINT CONTAINER -->
            <div class="print-area">
                
                <!-- THE TACTILE LABEL CARD -->
                <div class="label-card" id="label">
                    
                    <div class="label-grid">
                        <!-- ITEM ID -->
                        <div class="grid-cell label">Item Id</div>
                        <div class="grid-cell value">
                            <input 
                                type="text" 
                                class="title-case stamp-monospace" 
                                placeholder="46"
                            >
                        </div>

                        <!-- ITEM NAME -->
                        <div class="grid-cell label">Item Name</div>
                        <div class="grid-cell value">
                            <input 
                                type="text" 
                                class="item-name" 
                                placeholder="9 PC CUT"
                            >
                        </div>

                        <!-- DATE -->
                        <div class="grid-cell label">Date</div>
                        <div class="grid-cell value">
                            <input 
                                type="text" 
                                class="title-case stamp-monospace" 
                                placeholder="6 May"
                            >
                        </div>

                        <!-- ITEM GROUP -->
                        <div class="grid-cell label">Item Group</div>
                        <div class="grid-cell value">
                            <input 
                                type="text" 
                                class="title-case" 
                                placeholder="Non-Veg Marination"
                            >
                        </div>

                        <!-- MAKE TIME -->
                        <div class="grid-cell label">Make Time</div>
                        <div class="grid-cell value">
                            <input 
                                type="text" 
                                class="title-case stamp-monospace" 
                                placeholder="8May 17:40"
                            >
                        </div>

                        <!-- READY TIME -->
                        <div class="grid-cell label">Ready Time</div>
                        <div class="grid-cell value">
                            <input 
                                type="text" 
                                class="title-case stamp-monospace" 
                                placeholder="9May 17:40"
                            >
                        </div>

                        <!-- DISCARD TIME -->
                        <div class="grid-cell label">Discard Time</div>
                        <div class="grid-cell value">
                            <input 
                                type="text" 
                                class="title-case stamp-monospace" 
                                placeholder="10May 17:40"
                            >
                        </div>
                    </div>

                </div>
            </div>

            <!-- TACTILE DYNAMIC RULERS (FIGMA STYLE) -->
            <div class="dimension-indicator width-indicator" id="ui-width-indicator">
                <span id="text-ui-width">5.0 cm</span>
            </div>
            <div class="dimension-indicator height-indicator" id="ui-height-indicator">
                <span id="text-ui-height">3.5 cm</span>
            </div>

        </div>

    </div>

    <!-- DYNAMIC CONTROLLER JAVASCRIPT -->
    <script>
        const label = document.getElementById("label");
        const printArea = document.querySelector(".print-area");
        
        // UI Dashboard Elements
        const btnLandscape = document.getElementById("btn-landscape");
        const btnPortrait = document.getElementById("btn-portrait");
        
        const statusMode = document.getElementById("status-mode");
        const statusWidth = document.getElementById("status-width");
        const statusHeight = document.getElementById("status-height");
        
        const textUiWidth = document.getElementById("text-ui-width");
        const textUiHeight = document.getElementById("text-ui-height");

        /**
         * Sets dynamic @page printing rules to adjust browser print boundaries.
         * This forces width and height to swap perfectly at page boundaries.
         */
        function injectPrintPageRules(width, height) {
            let printStyle = document.getElementById("dynamic-print-style");
            if (!printStyle) {
                printStyle = document.createElement("style");
                printStyle.id = "dynamic-print-style";
                document.head.appendChild(printStyle);
            }
            const isPortrait = (width === '3.5cm');
            printStyle.innerHTML = `
                @page {
                    size: ${width} ${height};
                    margin: 0;
                }
                @media print {
                    .print-area {
                        width: ${width} !important;
                        height: ${height} !important;
                    }
                    .label-card {
                        width: ${width} !important;
                        height: ${height} !important;
                        border: 1px solid #000 !important;
                        border-radius: 0 !important;
                        box-shadow: none !important;
                        padding: 2.5px !important;
                        position: relative !important;
                        overflow: hidden !important;
                    }
                    ${isPortrait ? `
                    .label-card .label-grid {
                        width: 5cm !important;
                        height: 3.5cm !important;
                        position: absolute !important;
                        top: 0.75cm !important;
                        left: -0.75cm !important;
                        transform: rotate(90deg) !important;
                        transform-origin: center center !important;
                    }
                    ` : ''}
                }
            `;
        }

        /**
         * Orchestrates orientation updates, CSS states, and Dashboard Stats
         */
        function setOrientation(isPortrait) {
            if (isPortrait) {
                printArea.classList.add("rotated");
                
                // Toggle Button States
                btnLandscape.classList.remove("active");
                btnPortrait.classList.add("active");
                
                // Update Specs Panel
                statusMode.innerText = "Portrait";
                statusWidth.innerText = "3.5 cm";
                statusHeight.innerText = "5.0 cm";
                
                // Update emulated rulers
                textUiWidth.innerText = "3.5 cm";
                textUiHeight.innerText = "5.0 cm";
                
                // Apply dynamic print margins/size
                injectPrintPageRules('3.5cm', '5cm');
            } else {
                printArea.classList.remove("rotated");
                
                // Toggle Button States
                btnLandscape.classList.add("active");
                btnPortrait.classList.remove("active");
                
                // Update Specs Panel
                statusMode.innerText = "Landscape";
                statusWidth.innerText = "5.0 cm";
                statusHeight.innerText = "3.5 cm";
                
                // Update emulated rulers
                textUiWidth.innerText = "5.0 cm";
                textUiHeight.innerText = "3.5 cm";
                
                // Apply dynamic print margins/size
                injectPrintPageRules('5cm', '3.5cm');
            }
        }

        /**
         * Original method name preservation: Rotates label to Portrait and initiates print
         */
        function rotateAndPrint() {
            setOrientation(true);
            
            // Allow 450ms for CSS spring/morph animation to finish beautifully
            setTimeout(() => {
                window.print();
            }, 450);
        }

        /**
         * Original method name preservation: Resets orientation to Landscape
         */
        function normalView() {
            setOrientation(false);
        }

        /**
         * Action to print the label in its current selected orientation
         */
        function triggerPrint() {
            window.print();
        }

        /**
         * Proactive handler to guarantee print orientations match current screen state
         * if the user uses browser default keyboard shortcut (Ctrl+P) instead of buttons.
         */
        window.addEventListener('beforeprint', () => {
            const isPortraitMode = printArea.classList.contains("rotated");
            if (isPortraitMode) {
                injectPrintPageRules('3.5cm', '5cm');
            } else {
                injectPrintPageRules('5cm', '3.5cm');
            }
        });
    </script>
