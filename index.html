<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Thermal Label Print</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{

            background:#ececec;

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            flex-direction:column;

            gap:15px;

            padding:20px;
        }

        /* BUTTONS */

        .button-group{

            display:flex;

            gap:10px;

            flex-wrap:wrap;
        }

        button{

            background:#111;

            color:white;

            border:none;

            padding:10px 18px;

            border-radius:8px;

            cursor:pointer;

            font-size:13px;

            font-weight:600;
        }

        button:hover{
            opacity:0.9;
        }

        /* PRINT AREA */

        .print-area{

            width:5cm;

            height:3.5cm;

            display:flex;

            justify-content:center;

            align-items:center;

            background:white;

            overflow:hidden;
        }

        /* LABEL */

        .label-card{

            width:5cm;

            height:3.5cm;

            background:white;

            border:1.5px solid #bdbdbd;

            border-radius:6px;

            padding:2px;

            overflow:hidden;
        }

        /* ROTATED MODE */

        .rotated{

            transform:rotate(90deg);

            transform-origin:center center;
        }

        table{

            width:100%;

            height:100%;

            border-collapse:collapse;

            table-layout:fixed;
        }

        td{

            border:1px solid #444;

            padding:1px 3px;

            font-size:7px;

            color:#111;

            vertical-align:middle;
        }

        /* LEFT COLUMN */

        .label{

            width:42%;

            font-weight:500;

            text-transform:capitalize;
        }

        /* RIGHT COLUMN */

        .value{
            font-weight:700;
        }

        /* INPUT */

        input{

            width:100%;

            border:none;

            outline:none;

            background:transparent;

            font-size:7px;

            font-weight:700;

            color:#111;
        }

        /* FORMATS */

        .title-case{
            text-transform:capitalize;
        }

        .item-name{
            text-transform:none;
        }

        /* PRINT */

        @media print{

            body{

                margin:0;

                padding:0;

                background:white;
            }

            .button-group{
                display:none;
            }

            .print-area{

                width:5cm;

                height:3.5cm;

                overflow:hidden;
            }

            .label-card{

                width:5cm;

                height:3.5cm;
            }

            @page{

                size:5cm 3.5cm;

                margin:0;
            }
        }

    </style>
</head>

<body>

    <!-- BUTTONS -->

    <div class="button-group">

        <button onclick="rotateLabel()">
            Rotate 90°
        </button>

        <button onclick="normalLabel()">
            Normal
        </button>

        <button onclick="window.print()">
            Print Label
        </button>

    </div>

    <!-- PRINT AREA -->

    <div class="print-area">

        <!-- LABEL -->

        <div class="label-card rotated" id="label">

            <table>

                <tr>

                    <td class="label">
                        Item Id
                    </td>

                    <td class="value">

                        <input 
                            type="text"
                            class="title-case"
                            placeholder="46"
                        >

                    </td>

                </tr>

                <tr>

                    <td class="label">
                        Item Name
                    </td>

                    <td class="value">

                        <input 
                            type="text"
                            class="item-name"
                            placeholder="9 PC CUT"
                        >

                    </td>

                </tr>

                <tr>

                    <td class="label">
                        Date
                    </td>

                    <td class="value">

                        <input 
                            type="text"
                            class="title-case"
                            placeholder="6 May"
                        >

                    </td>

                </tr>

                <tr>

                    <td class="label">
                        Item Group
                    </td>

                    <td class="value">

                        <input 
                            type="text"
                            class="title-case"
                            placeholder="Non-Veg Marination"
                        >

                    </td>

                </tr>

                <tr>

                    <td class="label">
                        Make Time
                    </td>

                    <td class="value">

                        <input 
                            type="text"
                            class="title-case"
                            placeholder="8May 17:40"
                        >

                    </td>

                </tr>

                <tr>

                    <td class="label">
                        Ready Time
                    </td>

                    <td class="value">

                        <input 
                            type="text"
                            class="title-case"
                            placeholder="9May 17:40"
                        >

                    </td>

                </tr>

                <tr>

                    <td class="label">
                        Discard Time
                    </td>

                    <td class="value">

                        <input 
                            type="text"
                            class="title-case"
                            placeholder="10May 17:40"
                        >

                    </td>

                </tr>

            </table>

        </div>

    </div>

    <!-- SCRIPT -->

    <script>

        const label = document.getElementById("label");

        function rotateLabel(){

            label.classList.add("rotated");
        }

        function normalLabel(){

            label.classList.remove("rotated");
        }

    </script>

</body>

</html>
