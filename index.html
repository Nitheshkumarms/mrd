<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Thermal Label Print</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{

            background:#ececec;

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            flex-direction:column;

            gap:15px;

            padding:20px;
        }

        /* BUTTON AREA */

        .button-group{

            display:flex;

            gap:10px;

            flex-wrap:wrap;

            justify-content:center;
        }

        button{

            background:#111;

            color:white;

            border:none;

            padding:10px 18px;

            border-radius:8px;

            cursor:pointer;

            font-size:13px;

            font-weight:600;
        }

        button:hover{
            opacity:0.9;
        }

        /* LABEL */

        .label-card{

            background:white;

            border:1.5px solid #bdbdbd;

            border-radius:6px;

            padding:2px;

            overflow:hidden;
        }

        /* LANDSCAPE */

        .label-card.landscape{

            width:5cm;

            height:3.5cm;
        }

        /* PORTRAIT */

        .label-card.portrait{

            width:3.5cm;

            height:5cm;
        }

        table{

            width:100%;

            height:100%;

            border-collapse:collapse;

            table-layout:fixed;
        }

        td{

            border:1px solid #444;

            padding:1px 3px;

            font-size:7px;

            color:#111;

            vertical-align:middle;
        }

        /* LEFT COLUMN */

        .label{

            width:42%;

            font-weight:500;

            text-transform:capitalize;
        }

        /* RIGHT COLUMN */

        .value{
            font-weight:700;
        }

        /* INPUT */

        input{

            width:100%;

            border:none;

            outline:none;

            background:transparent;

            font-size:7px;

            font-weight:700;

            color:#111;
        }

        /* FORMATS */

        .title-case{
            text-transform:capitalize;
        }

        .item-name{
            text-transform:none;
        }

        /* PRINT */

        @media print{

            body{

                background:white;

                margin:0;

                padding:0;
            }

            .button-group{

                display:none;
            }

            .label-card{

                margin:0;

                page-break-after:avoid;
            }

            @page{

                size:auto;

                margin:0;
            }
        }

    </style>
</head>

<body>

    <!-- BUTTONS -->

    <div class="button-group">

        <button onclick="setLandscape()">
            Landscape
        </button>

        <button onclick="setPortrait()">
            Portrait
        </button>

        <button onclick="window.print()">
            Print Label
        </button>

    </div>

    <!-- LABEL -->

    <div class="label-card landscape" id="label">

        <table>

            <!-- ITEM ID -->

            <tr>

                <td class="label">
                    Item Id
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="title-case"
                        placeholder="46"
                    >

                </td>

            </tr>

            <!-- ITEM NAME -->

            <tr>

                <td class="label">
                    Item Name
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="item-name"
                        placeholder="9 PC CUT"
                    >

                </td>

            </tr>

            <!-- DATE -->

            <tr>

                <td class="label">
                    Date
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="title-case"
                        placeholder="6 May"
                    >

                </td>

            </tr>

            <!-- ITEM GROUP -->

            <tr>

                <td class="label">
                    Item Group
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="title-case"
                        placeholder="Non-Veg Marination"
                    >

                </td>

            </tr>

            <!-- MAKE TIME -->

            <tr>

                <td class="label">
                    Make Time
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="title-case"
                        placeholder="8May 17:40"
                    >

                </td>

            </tr>

            <!-- READY TIME -->

            <tr>

                <td class="label">
                    Ready Time
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="title-case"
                        placeholder="9May 17:40"
                    >

                </td>

            </tr>

            <!-- DISCARD TIME -->

            <tr>

                <td class="label">
                    Discard Time
                </td>

                <td class="value">

                    <input 
                        type="text"
                        class="title-case"
                        placeholder="10May 17:40"
                    >

                </td>

            </tr>

        </table>

    </div>

    <!-- SCRIPT -->

    <script>

        const label = document.getElementById("label");

        function setLandscape(){

            label.classList.remove("portrait");

            label.classList.add("landscape");
        }

        function setPortrait(){

            label.classList.remove("landscape");

            label.classList.add("portrait");
        }

    </script>

</body>

</html>
